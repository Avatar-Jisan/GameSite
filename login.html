<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khelo - Login & Sign Up</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="assets/games_img/game_logo_bg.png" alt="Khelo Logo">
        </div>
        
        <nav>
            <a href="#" class="active">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>

       <div class="nav-buttons">
    <button id="navSignIn" class="btn-nav" onclick="showLogin()">Sign In</button>
    <button id="navSignUp" class="btn-nav" onclick="showSignup()">Sign Up</button>
</div>
    </header>

    <main class="container">
        <div class="form-box" id="loginForm">
            <p class="toggle-text">Don't have an account? <span onclick="showSignup()">Sign Up</span></p>
            <h1>Login</h1>
            <form>
                <div class="input-group">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-main">Sign In</button>
                <div class="form-footer">
                    <label><input type="checkbox"> Remember Me</label>
                    
                </div>
            </form>
        </div>

        <div class="form-box hidden" id="signupForm">
            <p class="toggle-text">Have an account? <span onclick="showLogin()">Login</span></p>
            <h1>Sign Up</h1>
            <form>
                <div class="input-group">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-shield-halved"></i>
                    <input type="password" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn-main">Register</button>
                <div class="form-footer">
                    <label><input type="checkbox"> Remember Me</label>
                    <a href="#">Terms & conditions</a>
                </div>
            </form>
        </div>
    </main>

    <a href="https://github.com/your-profile" target="_blank" class="subscribe-icon">
        <i class="fa-brands fa-github"></i>
        <span>GitHub</span>
    </a>

    <script src="js/login.js"></script>
</body>
</html>
