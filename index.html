<!doctype html>
<html lang="en">

<!-- Bootstrap CSS v5.2.1 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
  integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
<link rel="stylesheet" href="css/variable.css">
<link rel="stylesheet" href="css/main.css">

</head>

<body>
  <header>
    <div class="container">
      <div class="row">
        <div class="col-lg-4">
          <img src="" alt="main_logo">
          <h1 class="title"></h1>
        </div>
        <div class="col-lg-4"></div>
        <div class="col-lg-4"></div>

      </div>

      <head>
        <title>Title</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

        <!-- Bootstrap CSS v5.2.1 -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />

        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/nav.css" />
      </head>

      <body>

        <header class="navbar">
          <button class="menu-btn">
            <i class="fa-solid fa-bars" style="color: #97FEED;"></i>
          </button>
          <h2 class="logo">MiniGames</h2>


        </header>
        <nav class="slidebar">
          <ul>
            <li><i class="fa-solid fa-house" style="color: #FFFFC7;"></i> Home</li>

            <li><i class="fa-solid fa-clock" style="color: #FFFFC7;"></i> Recently Played</li>

            <li><i class="fa-solid fa-fire" style="color: #FFFFC7;"></i> Popular Games</li>

            <li><i class="fa-solid fa-bolt" style="color: #FFFFC7;"></i> Action</li>

            <li><i class="fa-solid fa-mountain" style="color: #FFFFC7;"></i> Adventure</li>

            <li><i class="fa-solid fa-car" style="color: #FFFFC7;"></i> Car</li>

            <li><i class="fa-solid fa-basketball" style="color: #FFFFC7;"></i> Basketball</li>

            <li><i class="fa-solid fa-puzzle-piece" style="color: #FFFFC7;"></i> Puzzle</li>

            <li><i class="fa-solid fa-ghost" style="color: #FFFFC7;"></i> Horror</li>
          </ul>
        </nav>
        <main class="container mt-4">

          <section class="slider position-relative">

            <button class="nav prev">&#10094;</button>

            <!-- Slide -->
            <div class="slide active">
              <div class="row ">

                <!-- TEXT -->
                <div class="col-md-6 slide-text">
                  <h1>Game Name</h1>
                  <p>
                    Short description about the game. You can write anything here later.
                  </p>
                  <button class="btn play-btn">Play Now</button>
                </div>

                <!-- IMAGE -->
                <div class="col-md-6 slide-image">
                  <img src="assets/default_img.png" class="img-fluid" alt="game image">
                </div>

              </div>
            </div>

            <!-- Second Slide -->
            <div class="slide">
              <div class="row ">

                <div class="col-md-6 slide-text">
                  <h1>Another Game</h1>
                  <p>Another description.</p>
                  <button class="btn play-btn">Play Now</button>
                </div>

                <div class="col-md-6 slide-image">
                  <img src="assets/default_img.png" class="img-fluid" alt="game image">
                </div>

              </div>
            </div>
            <!--third slide-->
            <div class="slide">
              <div class="row ">

                <div class="col-md-6 slide-text">
                  <h1>Another Game</h1>
                  <p>Another description.</p>
                  <button class="btn play-btn">Play Now</button>
                </div>

                <div class="col-md-6 slide-image">
                  <img src="assets/default_img.png" class="img-fluid" alt="game image">
                </div>

              </div>
            </div>

            <button class="nav next">&#10095;</button>

          </section>

        </main>

        <footer>

        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
          integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
          crossorigin="anonymous"></script>
        <script src="js/main.js"></script>

        <!-- Bootstrap JavaScript Libraries -->
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
          integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
          crossorigin="anonymous"></script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
          integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
          crossorigin="anonymous"></script>
      </body>

</html>
